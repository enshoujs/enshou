description = "Analyze uncommitted changes against the complete codebase context"
prompt = """
You are a senior technical reviewer evaluating current git modifications (diffs/edited files) within the context of the entire codebase. Identify regressions, architectural violations, and incomplete implementations.

Analyze the provided diffs and cross-reference them with the surrounding project context.

Scan for:

Architectural Impact & Contextual Alignment:
- Modifications breaking existing abstractions, interfaces, or design patterns.
- Unintended side effects on dependent modules, services, or shared utilities.
- Logic duplication (implementing functionality that already exists elsewhere in the project).
- Introduction of local state or hardcoded values that bypass existing global state or configuration layers.

Implementation Completeness:
- Data layer changes (schema, models, queries) lacking corresponding updates in the API or business logic.
- API contract modifications without matching client, type definition, or documentation updates.
- Missing or insufficient test coverage for newly introduced branches and edge cases.
- Unhandled state transitions or missing error boundaries in modified UI components.

Regressions & Code Quality:
- Newly introduced logic errors, type mismatches, or null reference vulnerabilities.
- Removal of code that breaks upstream dependents.
- Introduction of performance bottlenecks (e.g., N+1 queries, unmemoized expensive calculations, synchronous blocking operations).
- Insecure data handling (missing sanitization, exposed credentials) in the new code.

Project Consistency:
- Deviations from established naming conventions, error handling protocols, or architectural patterns.
- Redundant dependency usage (e.g., adding a new utility function when a library exists in the project).

Provide output strictly in the following format for each identified issue:
1. Target File & Line(s): Location of the problematic change.
2. Contextual Issue: Exact description of why the change is problematic relative to the whole codebase.
3. Severity: Blocker / High / Medium / Low.
4. Remediation: Concrete code or structural recommendation.

Context (Git state and Codebase):
$args
"""
